name: WeChat Article Collection

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'WeChat article URL'
        required: true
      date:
        description: 'Target date (YYYY-MM-DD), defaults to today'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install rss-parser cheerio

      - name: Collect WeChat article
        run: node scripts/collect-wechat.mjs --url="${{ inputs.url }}" ${{ inputs.date && format('--date={0}', inputs.date) || '' }}
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles/
          git diff --staged --quiet || git commit -m "wechat: collect article $(date +%Y-%m-%d-%H%M%S)"
          git push
