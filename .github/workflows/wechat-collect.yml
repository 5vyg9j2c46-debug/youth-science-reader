name: WeChat Article Collection

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'WeChat article URL'
        required: true
      date:
        description: 'Target date (YYYY-MM-DD), defaults to today'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install rss-parser cheerio

      - name: Collect WeChat article
        continue-on-error: true
        run: node scripts/collect-wechat.mjs --url="${{ inputs.url }}" ${{ inputs.date && format('--date={0}', inputs.date) || '' }}
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/articles/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "wechat: article $(date +%Y-%m-%d-%H%M)"
          git pull origin main --rebase --allow-unrelated-histories || true
          git push origin main || git push origin main --force-with-lease
