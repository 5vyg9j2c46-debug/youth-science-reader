<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日要闻摘录</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-left">
      <button id="btn-back" class="btn-icon hidden" aria-label="返回列表">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
    </div>
    <h1 class="site-title">每日要闻摘录</h1>
    <div class="header-right">
      <button id="btn-calendar-toggle" class="btn-icon" aria-label="日历看板">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </button>
    </div>
  </header>

  <aside id="calendar-panel" class="calendar-panel hidden">
    <div class="calendar-header">
      <button id="btn-prev-month" class="btn-icon" aria-label="上一月">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
      <span id="calendar-title" class="calendar-title"></span>
      <button id="btn-next-month" class="btn-icon" aria-label="下一月">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </button>
    </div>
    <div class="calendar-weekdays">
      <span>一</span><span>二</span><span>三</span>
      <span>四</span><span>五</span><span>六</span><span>日</span>
    </div>
    <div id="calendar-grid" class="calendar-grid"></div>
  </aside>

  <main id="main-content">
    <section id="view-home" class="view view-home">
      <div class="actions-bar">
        <button id="btn-generate" class="btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
          获取今日文摘
        </button>
        <div id="generate-status" class="generate-status hidden">
          <div class="spinner"></div>
          <span id="generate-status-text">正在生成中，请稍候...</span>
        </div>
        <div id="generate-progress" class="generate-progress hidden">
          <div class="progress-bar">
            <div id="progress-bar-fill" class="progress-bar-fill"></div>
          </div>
          <span id="progress-pct" class="progress-pct">0%</span>
        </div>
      </div>

      <div class="wechat-section">
        <div class="wechat-input-group">
          <input type="text" id="wechat-url-input" placeholder="粘贴微信文章「浏览器打开链接」收录优质好文" />
          <button id="btn-wechat-collect" class="btn-secondary">收录</button>
        </div>
        <div id="wechat-status" class="wechat-status hidden">
          <div class="spinner small"></div>
          <span id="wechat-status-text">收录中...</span>
        </div>
      </div>

      <div class="date-navigator">
        <button id="btn-prev-day" class="btn-icon" aria-label="前一天">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </button>
        <span id="current-date-display" class="date-display"></span>
        <button id="btn-next-day" class="btn-icon" aria-label="后一天">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </button>
      </div>

      <div id="article-list" class="article-list"></div>
      <div id="load-more-section" class="load-more-section">
        <span id="load-more-count" class="load-more-count hidden"></span>
        <button id="btn-load-more" class="btn-secondary btn-load-more hidden">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          拉取更多文章
        </button>
      </div>
      <div id="empty-state" class="empty-state hidden">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        <p>暂无文章，点击「获取今日文摘」生成</p>
      </div>
    </section>

    <section id="view-reader" class="view view-reader hidden">
      <article id="article-content" class="article-content">
        <div class="article-header">
          <div class="article-header-top">
            <span id="reader-category" class="article-category"></span>
            <a id="reader-source-link" class="btn-source-link hidden" href="#" target="_blank" rel="noopener">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/>
                <line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
              查看原文
            </a>
          </div>
          <h1 id="reader-title" class="article-title"></h1>
          <div class="article-meta">
            <span id="reader-readtime"></span>
            <span id="reader-source"></span>
            <span id="reader-wordcount"></span>
            <span id="reader-trim-status" class="trim-badge hidden"></span>
          </div>
        </div>
        <div id="reader-body" class="article-body"></div>
        <div class="article-end-sentinel" id="article-end-sentinel"></div>
      </article>

      <div id="quiz-entry" class="quiz-entry hidden"></div>

      <div id="quiz-container" class="quiz-container hidden">
        <div class="quiz-header">
          <h2 class="quiz-title">读后小测</h2>
          <span id="quiz-progress" class="quiz-progress-text"></span>
        </div>
        <div class="quiz-progress-bar-wrap">
          <div id="quiz-progress-bar" class="quiz-progress-bar"></div>
        </div>
        <div id="quiz-body" class="quiz-body"></div>
        <div id="quiz-feedback" class="quiz-feedback hidden"></div>
        <button id="quiz-next" class="btn-primary quiz-next hidden">下一题</button>
      </div>

      <div class="reader-footer">
        <button id="btn-mark-read" class="btn-primary btn-mark-read">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          已读完
        </button>
      </div>
    </section>
  </main>

  <div id="settings-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <h2>设置</h2>
      <div class="setting-item">
        <label for="platform-select">托管平台</label>
        <select id="platform-select" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.875rem;font-family:var(--font);background:var(--bg);color:var(--text);outline:none;">
          <option value="gitee">Gitee（国内推荐）</option>
          <option value="github">GitHub</option>
        </select>
      </div>
      <div class="setting-item">
        <label for="pat-input">访问令牌 (Token)</label>
        <input type="password" id="pat-input" placeholder="粘贴你的Token" />
        <p class="setting-hint">用于触发云端文章生成，仅保存在本地浏览器</p>
      </div>
      <div class="setting-item">
        <label for="repo-input">仓库地址</label>
        <input type="text" id="repo-input" placeholder="username/repo-name" />
      </div>
      <div class="modal-actions">
        <button id="btn-settings-save" class="btn-primary">保存</button>
        <button id="btn-settings-cancel" class="btn-secondary">取消</button>
      </div>
    </div>
  </div>

  <button id="btn-settings" class="btn-settings-float" aria-label="设置">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>

  <script src="js/progress.js"></script>
  <script src="js/github-api.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/article-list.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/article-reader.js"></script>
  <script src="js/wechat-collect.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
